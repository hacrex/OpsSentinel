version: '3.8'

services:
  backend:
    build: ./backend
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - GITHUB_WEBHOOK_SECRET=my_super_secret
      - GITHUB_CLIENT_ID=dummy_client_id
      - GITHUB_CLIENT_SECRET=dummy_client_secret
    volumes:
      - backend-data:/app

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  backend-data:
